name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Filet rapide (sans deps lourdes) : attrape les bugs "crash" — noms non
  # définis dans les fonctions, redéfinitions, erreurs de format, syntaxe.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.13'}
      - name: Install ruff
        run: pip install ruff
      - name: Lint — règles crash uniquement (pas de style)
        run: ruff check . --select E9,F821,F822,F823,F811,F706,F707,F5 --exclude venv,.venv
      - name: Byte-compile de toutes les sources
        run: |
          set -e
          find . -name '*.py' -not -path './venv/*' -not -path './.venv/*' -print0 \
            | xargs -0 -n1 python -m py_compile

  boot-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.13'}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Import test (boot smoke)
        run: |
          python -c "
          import importlib.util, flask, sys, traceback
          flask.Flask.run = lambda *a, **kw: None
          spec = importlib.util.spec_from_file_location('app', 'app.py')
          m = importlib.util.module_from_spec(spec)
          try:
              spec.loader.exec_module(m)
              routes = sorted(set(r.rule for r in m.app.url_map.iter_rules()))
              print(f'OK — {len(routes)} routes enregistrées')
          except Exception:
              traceback.print_exc(); sys.exit(1)
          "
